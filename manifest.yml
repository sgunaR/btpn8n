---
applications:
- name: n8n-appp
  docker:
    image: docker.n8n.io/n8nio/n8n:1.106.3
  command: >
    node -e "const {spawn}=require('child_process');const v=JSON.parse(process.env.VCAP_SERVICES||'{}');const s=(Object.values(v).flatMap(a=>Array.isArray(a)?a:[]).find(x=>String(x?.label||'').toLowerCase().includes('postgres')||String(x?.name||'').toLowerCase().includes('postgres'))||{}).credentials||{};if(Object.keys(s).length){process.env.DB_TYPE='postgresdb';process.env.DB_POSTGRESDB_HOST=s.hostname||s.host||process.env.DB_POSTGRESDB_HOST;process.env.DB_POSTGRESDB_PORT=String(s.port||process.env.DB_POSTGRESDB_PORT||'');process.env.DB_POSTGRESDB_DATABASE=s.dbname||s.database||s.name||process.env.DB_POSTGRESDB_DATABASE;process.env.DB_POSTGRESDB_USER=s.username||s.user||process.env.DB_POSTGRESDB_USER;process.env.DB_POSTGRESDB_PASSWORD=s.password||process.env.DB_POSTGRESDB_PASSWORD;}process.env.N8N_PORT=process.env.PORT||process.env.N8N_PORT||'8080';process.env.N8N_LISTEN_ADDRESS='0.0.0.0';const p=spawn('n8n',['start'],{stdio:'inherit',env:process.env});p.on('exit',c=>process.exit(c));"
  memory: 2G
  disk_quota: 2G
  instances: 1
  random-route: true
  services:
  - n8n-db
  env:
    NODE_ENV: production
    N8N_HOST: 0.0.0.0
    N8N_LISTEN_ADDRESS: 0.0.0.0
    N8N_PROTOCOL: https
    DB_POSTGRESDB_SSL: true
    DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED: false
    EXECUTIONS_PROCESS: main
    N8N_METRICS: true
    N8N_DIAGNOSTICS_ENABLED: false
    N8N_VERSION_NOTIFICATIONS_ENABLED: false
    N8N_TEMPLATES_ENABLED: false
    N8N_ONBOARDING_FLOW_DISABLED: true
    N8N_PERSONALIZATION_ENABLED: false
    N8N_LOG_LEVEL: info
