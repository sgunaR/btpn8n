---
applications:
- name: ((app-name))
  docker:
    image: ((docker-image))
  memory: ((memory))
  disk_quota: ((disk-quota))
  instances: ((instances))
  routes:
  - route: ((app-name)).((landscape-domain))
  services:
  - ((db-service-name))
  env:
    NODE_ENV: production
    N8N_HOST: 0.0.0.0
    N8N_PORT: 8080
    N8N_PROTOCOL: https
    WEBHOOK_URL: https://((app-name)).((landscape-domain))
    N8N_EDITOR_BASE_URL: https://((app-name)).((landscape-domain))
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: postgres-c6847c68-80a5-45f9-90f6-f8f46a8d9644.cqryblsdrbcs.us-east-1.rds.amazonaws.com
    DB_POSTGRESDB_PORT: 1879
    DB_POSTGRESDB_DATABASE: PqBXwqyUPPUm
    DB_POSTGRESDB_USER: 6bf7126c8919
    DB_POSTGRESDB_PASSWORD: 27055b8cdecaa64aa66764f18
    DB_POSTGRESDB_SSL: true
    DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED: false
    EXECUTIONS_PROCESS: main
    N8N_METRICS: true
    N8N_DIAGNOSTICS_ENABLED: false
    N8N_VERSION_NOTIFICATIONS_ENABLED: false
    N8N_TEMPLATES_ENABLED: false
    N8N_ONBOARDING_FLOW_DISABLED: true
    N8N_PERSONALIZATION_ENABLED: false
