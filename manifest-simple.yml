---
applications:
- name: n8n-workflow-app
  docker:
    image: docker.n8n.io/n8nio/n8n:latest
  memory: 2G
  disk_quota: 2G
  instances: 1
  command: "sh -c 'export N8N_PORT=$PORT && export N8N_HOST=0.0.0.0 && export N8N_LISTEN_ADDRESS=0.0.0.0 && n8n start'"
  health-check-type: process
  timeout: 300
  services:
  - n8n-db
  env:
    N8N_PROTOCOL: https
    N8N_DISABLE_UI: false
    N8N_LOG_LEVEL: info
    N8N_SECURE_COOKIE: false
    NODE_ENV: production
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: postgres-c6847c68-80a5-45f9-90f6-f8f46a8d9644.cqryblsdrbcs.us-east-1.rds.amazonaws.com
    DB_POSTGRESDB_PORT: 1879
    DB_POSTGRESDB_DATABASE: PqBXwqyUPPUm
    DB_POSTGRESDB_USER: ee49c11cbd55
    DB_POSTGRESDB_PASSWORD: 8c06e7617bdc5a2db2f36695a0e
    DB_POSTGRESDB_SSL_ENABLED: true
    DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED: false
    N8N_BASIC_AUTH_ACTIVE: false
    N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: false
    EXECUTIONS_PROCESS: main
    N8N_METRICS: false
    N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN: true
    N8N_DEFAULT_BINARY_DATA_MODE: filesystem
